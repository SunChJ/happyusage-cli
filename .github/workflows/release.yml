name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset_name: hu-darwin-arm64
          - goos: darwin
            goarch: amd64
            asset_name: hu-darwin-amd64
          - goos: linux
            goarch: amd64
            asset_name: hu-linux-amd64
          - goos: windows
            goarch: amd64
            asset_name: hu-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/SunChJ/happyusage-cli.Version=${GITHUB_REF_NAME}" -o "dist/${{ matrix.asset_name }}" ./cmd/hu
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.asset_name }}
